 <!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Purple Chat</title>
    <style>

        
        .chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bubble {
            max-width: 60%;
            padding: 15px;
            border-radius: 18px;
            backdrop-filter: blur(5px);
        }

        .sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #6a0dad, #bc13fe);
            box-shadow: 0 4px 15px rgba(188, 19, 254, 0.3);
        }

        .received {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-input {
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            gap: 10px;
        }

        input {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            outline: none;
        }

        button {
            background: #bc13fe;
            border: none;
            padding: 0 25px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="shape circle"></div>
    <div class="shape triangle"></div>
    <div class="shape square"></div>
    <div class="shape small-circle"></div>

    <!--<nav>
        <h2 style="color: #bc13fe;">Kontakte</h2>
        <div class="contact">👤 Max Mustermann</div>
        <div class="contact">👤 Julia Admin</div>
        <div class="contact">👤 Tech Support</div>
    </nav>-->

    <main>
        <div class="chat-messages" id="chat">
            <div class="bubble received">Schau dir das mal an! Geometrische Formen im Hintergrund.</div>
            <div class="bubble sent">Sieht stark aus. Der Mix aus Dreiecken und Kreisen passt perfekt zum Lila.</div>
            <div class="bubble received">Und alles bewegt sich ganz leicht.</div>
        </div>

        <div class="chat-input">
            <input type="text" id="input" placeholder="Nachricht schreiben...">
            <button onclick="send()">Senden</button>
        </div>
    </main>

    <script>
        function send() {
            const input = document.getElementById('input');
            if(input.value !== "") {
                const msg = document.createElement('div');
                msg.className = 'bubble sent';
                msg.innerText = input.value;
                document.getElementById('chat').appendChild(msg);
                input.value = "";
                document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            }
        }
    </script>
</body>
</html>
