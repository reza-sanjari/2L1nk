<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherChat - Purple Edition</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- BACKGROUND DESIGN --- */
        @keyframes fluidBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(-45deg, #0a0a0a, #1a0525, #310a5d, #000000);
            background-size: 400% 400%;
            animation: fluidBG 15s ease infinite;
            height: 100vh;
            display: flex;
            flex-direction: column; /* Erlaubt Top-Bar oben */
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* --- GEOMETRISCHE FORMEN --- */
        .shape {
            position: absolute;
            z-index: 0;
            opacity: 0.3;
            animation: floatShape 20s infinite ease-in-out;
            background: linear-gradient(135deg, #bc13fe 0%, #000000 100%);
        }

        @keyframes floatShape {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            50% { transform: translateY(-40px) rotate(10deg) scale(1.1); }
        }

        .circle { width: 300px; height: 300px; border-radius: 50%; top: -50px; left: 10%; filter: blur(40px); }
        .triangle { width: 250px; height: 250px; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); bottom: 10%; left: 30%; animation-delay: -5s; }
        .square { width: 180px; height: 180px; top: 20%; right: 10%; transform: rotate(45deg); animation-delay: -2s; }

        /* --- TOP NAVIGATION BAR --- */
        .top-bar {
            height: 65px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(188, 19, 254, 0.2);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 25px;
            z-index: 100;
        }

        .top-bar-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-icon {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-icon:hover {
            color: #bc13fe;
            filter: drop-shadow(0 0 8px #bc13fe);
        }

        .avatar-group {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-left: 20px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: linear-gradient(45deg, #bc13fe, #4b0082);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(188, 19, 254, 0.2);
        }

        /* --- CONTENT WRAPPER --- */
        .app-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        nav {
            width: 320px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(188, 19, 254, 0.2);
            display: flex;
            flex-direction: column;
            padding: 25px;
            z-index: 10;
        }

        .brand { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .brand-icon { 
            border: 1px solid #bc13fe; 
            padding: 8px 10px; 
            border-radius: 8px; 
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
            color: #bc13fe;
        }

        .search-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .search-box input { background: none; border: none; color: white; outline: none; width: 100%; }

        .chat-list-header {
            display: flex; 
            justify-content: space-between; 
            font-size: 0.75rem; 
            letter-spacing: 2px; 
            color: rgba(255,255,255,0.5);
            margin-bottom: 20px;
        }

        .empty-state {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0.4;
            text-align: center;
        }

        .btn-action {
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 12px;
        }
        .btn-action:hover { background: rgba(188, 19, 254, 0.2); border-color: #bc13fe; }

        .btn-voice {
            background: linear-gradient(90deg, #4b0082, #bc13fe);
            border: none;
            padding: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(188, 19, 254, 0.3);
        }

        /* --- MAIN VIEW --- */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .welcome-icon {
            font-size: 4rem;
            color: #bc13fe;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(188, 19, 254, 0.6));
        }

        .feature-grid {
            display: flex;
            gap: 20px;
            margin-top: 50px;
        }

        .feature-card {
            width: 120px;
            height: 120px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }
        .feature-card:hover { 
            border-color: #bc13fe; 
            transform: translateY(-5px);
            background: rgba(188, 19, 254, 0.1);
        }

        .status-bar {
            position: absolute;
            bottom: 40px;
            font-family: monospace;
            color: #bc13fe;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cursor {
            width: 8px;
            height: 18px;
            background: #bc13fe;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

    </style>
</head>
<body>

    <div class="shape circle"></div>
    <div class="shape triangle"></div>
    <div class="shape square"></div>

    <header class="top-bar">
        <div class="top-bar-actions">
            <i class="fas fa-search nav-icon" title="Global Search"></i>
            <i class="fas fa-bell nav-icon" title="Notifications"></i>
            <i class="fas fa-cog nav-icon" title="Settings"></i>
            <div class="avatar-group">
                <div style="text-align: right; line-height: 1;">
                    <div style="font-size: 0.85rem; font-weight: bold;">User</div>
                    <div style="font-size: 0.6rem; opacity: 0.5; color: #4ade80;">ONLINE</div>
                </div>
                <div class="avatar">AC</div>
            </div>
        </div>
    </header>

    <div class="app-container">
        <nav>
            <div class="brand">
                <div class="brand-icon"><i class="fas fa-shield-alt"></i></div>
                <div>
                    <div style="font-weight: bold; font-size: 1.2rem; color: #bc13fe;">2L1nk</div>
                    <div style="font-size: 0.6rem; opacity: 0.5; letter-spacing: 2px;">ENCRYPTED</div>
                </div>
            </div>

            <div class="search-box">
                <i class="fas fa-search" style="opacity: 0.4;"></i>
                <input type="text" placeholder="Suchen...">
            </div>

            <div class="chat-list-header">
                <span>CHATS</span>
                <i class="fas fa-plus"></i>
            </div>

            <div class="empty-state">
                <i class="fas fa-users" style="font-size: 2rem; margin-bottom: 10px;"></i>
                <p>Keine aktiven Chats</p>
            </div>

            <button class="btn-action">+ Neuer Chat</button>
            <button class="btn-action btn-voice"><i class="fas fa-voice"></i> &nbsp;  Anrufen</button>
            
            <div style="display: flex; justify-content: space-around; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); opacity: 0.6;">
                <i class="fas fa-question-circle"></i>
                <i class="fas fa-sign-out-alt"></i>
            </div>
        </nav>

        <main>
            <div class="welcome-icon">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h1 style="font-size: 2.5rem; margin: 0;">Willkommen bei <span style="color: #bc13fe;">2L1nk</span></h1>
            <!--<p style="opacity: 0.7; max-width: 500px; line-height: 1.6; margin-top: 20px;">
                End-to-End verschlüsselte Kommunikation. Wähle einen Chat aus oder starte eine neue Konversation über das Menü links.
            </p>-->

            <div class="feature-grid">
                <div class="feature-card">
                    <i class="fas fa-lock" style="color: #4ade80;"></i>
                    <span style="font-size: 0.7rem; font-weight: bold; opacity: 0.6;">AES-256</span>
                </div>
                <div class="feature-card">
                    <i class="fas fa-comment" style="color: #bc13fe;"></i>
                    <span style="font-size: 0.7rem; font-weight: bold; opacity: 0.6;">CHAT</span>
                </div>
                <div class="feature-card">
                    <i class="fas fa-voice" style="color: #a855f7;"></i>
                    <span style="font-size: 0.7rem; font-weight: bold; opacity: 0.6;">Voice</span>
                </div>
            </div>

            <div class="status-bar">
                <span>> Sichere Verbindung aktiv</span>
                <div class="cursor"></div>
            </div>
        </main>
    </div>

</body>
</html>
